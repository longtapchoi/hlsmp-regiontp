name: HLSMP-RegionTp
version: '1.0.0'
main: com.hlsmp.regiontp.RegionTpPlugin
api-version: '1.21'
description: Auto-teleport players below Y threshold in configured worlds
authors: [HLSMP]

commands:
  hlsmpregiontp:
    description: HLSMP-RegionTp management command
    aliases: [regiontp]
    usage: /hlsmpregiontp <reload|addworld|removeworld|list>
    permission: hlsmpregiontp.admin
